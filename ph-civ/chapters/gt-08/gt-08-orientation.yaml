where_this_sits: |
  This chapter closes the early Civilization-side Game Theory wave by treating communism, capitalism, and ideology as deep civilizational forces. Its main concern is how belief systems organize collective life before the later war sequence applies them under pressure.
reading_posture: |
  Read it as a law-discovery chapter about ideology, legitimacy, and historical consciousness. The lecture is best used to compare civilizational worldviews rather than to map a single crisis front.
historical_pressure_points:
  - communism, capitalism, and ideology as world-order forces
  - legitimacy and belief as organizing pressures in collective life
  - historical consciousness as part of civilizational competition
limits_of_the_frame: |
  This entry is provisional and preserves the lecture's interpretive frame without treating it as final scholarly judgment. Social theory claims, historical generalizations, demographic arguments, and political implications still require later comparative review before quotation-grade or publication-grade use.
return_path: |
  Return through ph-civ/chapters/gt-08/, the commentary canvas, and the canonical source capture under sources/. The full lecture transcript is preserved in-repo in the source capture.
