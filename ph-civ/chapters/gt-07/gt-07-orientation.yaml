where_this_sits: |
  This chapter remains on the Civilization side because it explains the American nation-game, reserve-currency logic, and empire-building grammar as structural law rather than as a chapter of immediate war application.
reading_posture: |
  Read it as a chapter about how the American system works at the level of incentives, institutions, and imperial design. It helps the reader understand the order before judging its crisis phase.
historical_pressure_points:
  - the American nation-game as a structural incentive system
  - reserve-currency power and empire-building grammar
  - domestic order linked to global financial and military reach
limits_of_the_frame: |
