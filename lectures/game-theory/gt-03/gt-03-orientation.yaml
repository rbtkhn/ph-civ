where_this_sits: |
  This chapter keeps the Game Theory sequence in the Civilization volume by treating family, hierarchy, class, and social trust as structural rules of reproduction rather than as war-time application material.
reading_posture: |
  Read it as a chapter about how households, parenting, and class expectations shape long-run social behavior and opportunity structures.
historical_pressure_points:
  - family formation and parenting as engines of social reproduction
  - wealth, class position, and trust as game-structuring forces
  - household strategy as a bridge between micro life and civilizational order
limits_of_the_frame: |
  This entry is provisional and preserves the lecture's interpretive frame without treating it as final scholarly judgment. Social theory claims, historical generalizations, demographic arguments, and political implications still require later comparative review before quotation-grade or publication-grade use.
