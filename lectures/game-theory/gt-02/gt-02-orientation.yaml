where_this_sits: |
  This chapter turns the Game Theory method toward schooling, class sorting, and institutional incentives. It belongs on the Civilization side because it studies how a modern society reproduces itself through one of its core formative institutions.
reading_posture: |
  Read it as a law-discovery chapter about educational systems, elite filtering, and the social game structure surrounding youth formation rather than as a live crisis packet.
historical_pressure_points:
  - schooling as an institutional sorting machine
  - class reproduction, status competition, and obedience incentives
  - education as a civilizational mechanism for shaping behavior
limits_of_the_frame: |
